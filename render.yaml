services:
  - type: web
    name: ferroflux-portal
    runtime: docker
    dockerfilePath: ./portal/Dockerfile
    dockerContext: ./portal
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORTAL_SECRET_KEY
        generateValue: true
      - key: PORTAL_USER
        value: admin
      # Set via Render dashboard — never commit plaintext passwords
      - key: PORTAL_PASS
        sync: false
